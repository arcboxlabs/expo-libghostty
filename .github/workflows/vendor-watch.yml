name: Vendor watch

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compare vendor pins against upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/vendor-watch.sh
